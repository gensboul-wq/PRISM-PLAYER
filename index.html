<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — Music Video Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --abyss: #0D0D14;
    --deep: #16162A;
    --gold: #FFD166;
    --gold-light: #FFE599;
    --coral: #FF6B6B;
    --teal: #06D6A0;
    --white: #F4F4F8;
    --muted: #A0A0B8;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,209,102,0.35);
  }

  html { overflow: hidden; height: 100%; }
  body {
    overflow: hidden; height: 100%; max-width: 100vw;
    background: var(--abyss); color: var(--white);
    font-family: 'Inter', sans-serif;
  }

  /* ── AMBIENT BACKGROUND ── */
  #ambient {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(78,205,196,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  #ambient-blur {
    position: fixed; inset: 0; z-index: 0;
    filter: blur(80px); opacity: 0; transition: opacity 1s;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  #app {
    position: fixed; inset: 0; z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    min-height: 0;
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--teal); -webkit-text-fill-color: var(--teal); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .hbtn {
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--white); font-family: 'Inter', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .hbtn:hover { background: rgba(255,209,102,0.15); border-color: var(--gold); }

  /* ── VIDEO ZONE ── */
  #video-zone {
    grid-column: 1; grid-row: 2;
    position: relative; overflow: hidden;
    background: #000;
  }
  #video-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #main-video {
    width: 100%; height: 100%;
    object-fit: contain;
    transition: filter 0.5s;
  }
  /* Video chromatic effect synced to bass */
  #main-video.bass-hit {
    filter: saturate(1.8) contrast(1.1);
  }

  /* Drop overlay */
  #drop-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 48px;
    cursor: default;
    overflow: hidden;
  }
  #drop-overlay.hidden { display: none; }
  .drop-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.6; }
  .drop-title {
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem;
    color: var(--white); letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .drop-sub { font-size: 0.8rem; color: var(--muted); }
  #file-input { display: none; }

  /* ── SIDEBAR — hidden, content moved to popups ── */
  #sidebar { display: none; }

  /* ── EQUALIZER CANVAS (3D Ring) ── */
  #eq-section {
    flex: 0 0 auto;
    padding: 20px;
    border-bottom: 1px solid var(--glass-border);
    display: flex; flex-direction: column; align-items: center;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 14px; align-self: flex-start;
  }
  #eq-canvas {
    width: 220px; height: 220px;
    display: block;
  }

  /* EQ Mode buttons */
  .eq-modes {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .eq-mode-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em;
    padding: 5px 10px; border-radius: 4px;
    border: 1px solid rgba(255,209,102,0.3);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .eq-mode-btn.active {
    background: rgba(255,209,102,0.2);
    border-color: var(--gold); color: var(--gold-light);
    font-weight: 600;
  }

  /* ── EQ BANDS ── */
  #bands-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .bands-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px; align-items: end;
    height: 80px;
  }
  .band-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    height: 100%;
  }
  .band-slider {
    writing-mode: vertical-lr;
    direction: rtl;
    -webkit-appearance: none; appearance: none;
    width: 4px; flex: 1;
    background: transparent;
    outline: none; cursor: pointer;
  }
  .band-slider::-webkit-slider-track {
    width: 4px;
    background: linear-gradient(to bottom, var(--teal), var(--glass));
    border-radius: 2px;
  }
  .band-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--abyss);
    box-shadow: 0 0 8px rgba(201,168,76,0.6);
    cursor: grab;
  }
  .band-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--muted);
    text-align: center;
  }

  /* ── VOLUME & CONTROLS ── */
  #vol-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .vol-row {
    display: flex; align-items: center; gap: 12px;
  }
  .vol-icon { font-size: 1.1rem; cursor: pointer; transition: opacity 0.2s; }
  .vol-icon:hover { opacity: 0.7; }
  #vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--glass); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold-light);
    border: 2px solid var(--abyss);
    box-shadow: 0 0 12px rgba(232,201,122,0.5);
    cursor: grab;
  }
  #vol-slider::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--gold) var(--vol-pct, 80%), var(--glass) 0%);
  }
  #vol-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--white); min-width: 30px; text-align: right;
  }

  /* Tempo / pitch */
  .slider-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  .slider-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    min-width: 48px;
  }
  .mini-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .mini-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--teal); cursor: grab;
  }
  .mini-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--white); min-width: 32px; text-align: right;
  }

  /* ── SHARE PANEL ── */
  #share-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px; border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--white);
    font-family: 'Inter', sans-serif; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s;
  }
  .share-btn:hover { transform: translateY(-1px); border-color: var(--gold); color: var(--gold-light); }
  .share-btn .sicon { font-size: 1rem; }
  .share-full {
    grid-column: 1 / -1; margin-top: 4px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(78,205,196,0.08));
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* ── TRACK INFO ── */
  #info-section {
    flex: 1; padding: 16px 20px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  #track-title {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 0.95rem; color: var(--gold-light);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  #track-meta {
    font-size: 0.72rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── BOTTOM CONTROLS ── */
  #controls {
    grid-column: 1; grid-row: 3;
    padding: 10px 16px 14px;
    background: rgba(13,13,20,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    display: flex; flex-direction: column; gap: 8px;
    position: relative; min-height: 0; overflow: visible;
  }
  #progress-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .time-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; color: var(--muted);
    min-width: 34px;
  }
  #progress {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.7);
    cursor: grab;
  }
  #progress::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--gold) var(--prog-pct, 0%), rgba(255,255,255,0.08) 0%);
  }

  /* Playback buttons — 2 ranje */
  .ctrl-row {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; width: 100%; overflow: hidden;
  }
  .tools-row { gap: 8px; }
  .play-row  { gap: 14px; }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem;
    transition: all 0.2s; padding: 5px; flex-shrink: 0;
  }
  .ctrl-btn:hover { color: var(--gold-light); transform: scale(1.1); }
  #play-btn {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; cursor: pointer; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
    transition: all 0.2s; color: var(--abyss);
  }
  #play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(201,168,76,0.6); }

  /* ── POPUP PANELS (EQ, Bann, Volim, Pataje) ── */
  .popup-panel {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%; transform: translateX(-50%);
    background: #16162A;
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.85);
    display: none; flex-direction: column; gap: 14px;
    z-index: 100;
    width: min(320px, 92vw);
    max-height: 70vh; overflow-y: auto;
  }
  .popup-panel.open { display: flex; }

  /* EQ popup */
  #eq-popup { width: min(320px, 92vw); }
  #eq-popup .eq-canvas-wrap { display: flex; justify-content: center; }
  #eq-popup canvas { width: 140px; height: 140px; display: block; }
  .eq-popup-modes { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }

  /* Bands popup */
  #bands-popup { width: min(340px, 92vw); }
  .bands-grid {
    display: grid; grid-template-columns: repeat(8,1fr);
    gap: 6px; align-items: end; height: 90px;
  }
  .band-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .band-slider {
    writing-mode: vertical-lr; direction: rtl;
    -webkit-appearance: none; appearance: none;
    width: 4px; flex: 1; background: transparent; outline: none; cursor: pointer;
  }
  .band-slider::-webkit-slider-track {
    width: 4px;
    background: linear-gradient(to bottom, var(--teal), rgba(6,214,160,0.15));
    border-radius: 2px;
  }
  .band-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); border: 2px solid var(--abyss);
    box-shadow: 0 0 8px rgba(255,209,102,0.5); cursor: grab;
  }
  .band-label { font-family:'JetBrains Mono',monospace; font-size:0.5rem; color:var(--muted); text-align:center; }
  .bands-reset {
    background: transparent; border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted); font-family:'Inter',sans-serif; font-size:0.72rem;
    padding: 6px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    align-self: flex-end;
  }
  .bands-reset:hover { border-color: var(--gold); color: var(--gold); }

  /* Volume popup */
  #vol-popup { width: min(300px, 92vw); }
  .vol-row { display: flex; align-items: center; gap: 12px; }
  .vol-icon { font-size: 1.2rem; cursor: pointer; }
  #vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px;
    outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold-light); border: 2px solid var(--abyss);
    box-shadow: 0 0 12px rgba(255,229,153,0.5); cursor: grab;
  }
  #vol-slider::-webkit-slider-runnable-track {
    height: 5px; border-radius: 3px;
    background: linear-gradient(to right, var(--gold) var(--vol-pct,80%), rgba(255,255,255,0.1) 0%);
  }
  #vol-val { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--white); min-width:34px; text-align:right; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--muted); min-width:52px; }
  .mini-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .mini-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: var(--teal); cursor: grab;
  }
  .mini-val { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--white); min-width:34px; text-align:right; }

  /* Share popup */
  #share-popup { width: min(290px, 92vw); }
  .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px; border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--white);
    font-family:'Inter',sans-serif; font-size:0.75rem;
    cursor: pointer; transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--gold); color: var(--gold-light); background: rgba(255,209,102,0.08); }
  .share-btn .sicon { font-size: 1rem; }
  .share-full { grid-column: 1/-1; border-color: rgba(255,209,102,0.4); color: var(--gold-light); }

  /* ── POPUP ACTION BUTTONS (in ctrl-row) ── */
  .popup-btn {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: var(--white); font-size: 0.95rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .popup-btn:hover { border-color: var(--gold); color: var(--gold-light); background: rgba(255,209,102,0.12); }
  .popup-btn.active {
    background: rgba(255,209,102,0.2);
    border-color: var(--gold); color: var(--gold);
    box-shadow: 0 0 14px rgba(255,209,102,0.3);
  }

  /* Skip -10/+10 nav buttons */
  .nav-btn {
    font-size: 1.1rem !important; padding: 4px 1px !important;
    color: var(--muted) !important; flex-shrink: 0;
  }
  .nav-btn:hover { color: var(--white) !important; }

  /* Prev/Next track skip buttons */
  .skip-btn {
    font-size: 1.2rem !important; padding: 4px 1px !important;
    color: var(--white) !important; flex-shrink: 0; opacity: 0.85;
  }
  .skip-btn:hover { opacity: 1; color: var(--gold-light) !important; }

  /* Fullscreen btn in header — ikòn sèlman, kare */
  #fs-btn {
    width: 36px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; border-radius: 8px;
  }

  /* Progress */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(26,26,46,0.95); border: 1px solid var(--gold);
    color: var(--gold-light); font-family: 'Inter', sans-serif; font-size: 0.8rem;
    padding: 10px 20px; border-radius: 8px;
    opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
    backdrop-filter: blur(20px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FULLSCREEN MODE ── */
  :fullscreen #sidebar { display: none; }
  :fullscreen #app { grid-template-columns: 1fr; }
  :fullscreen #controls { grid-column: 1; }

  /* Open buttons on drop overlay */
  .open-btn {
    background: rgba(255,209,102,0.15);
    border: 1.5px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Inter', sans-serif; font-size: 0.85rem;
    padding: 10px 20px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s;
  }
  .open-btn:hover { background: rgba(255,209,102,0.28); }

  /* Audio mode — big EQ shown when playing audio-only */
  #audio-mode {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: var(--abyss);
    flex-direction: column;
  }
  #audio-mode.active { display: flex; }
  #eq-fullscreen { width: min(360px, 88vw); height: min(360px, 88vw); display: block; }
  #audio-art {
    font-size: 0.9rem; letter-spacing: 0.25em;
    color: var(--gold); opacity: 0.35;
    font-family: 'Orbitron', sans-serif;
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }

  /* Playlist popup */
  #playlist-popup { width: min(340px, 92vw); }
  #playlist-list {
    display: flex; flex-direction: column; gap: 3px;
    overflow-y: auto; max-height: 42vh;
    scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
  }
  .pl-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s; min-width: 0;
  }
  .pl-item:hover { background: rgba(255,209,102,0.08); border-color: rgba(255,209,102,0.2); }
  .pl-item.playing { background: rgba(255,209,102,0.14); border-color: var(--gold); }
  .pl-icon { font-size: 0.95rem; flex-shrink: 0; }
  .pl-name {
    font-size: 0.74rem; color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .pl-item.playing .pl-name { color: var(--gold-light); font-weight: 600; }
  .pl-dur { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); flex-shrink: 0; }
  .pl-empty { font-size: 0.78rem; color: var(--muted); text-align: center; padding: 20px 0; }

  /* Repeat button — 3 eta */
  .repeat-btn {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: var(--white); font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .repeat-btn.one { border-color: var(--gold); color: var(--gold); background: rgba(255,209,102,0.18); }
  .repeat-btn.all { border-color: var(--teal); color: var(--teal); background: rgba(6,214,160,0.15); }

  /* Agrandi tout ctrl-btn yo */
  .skip-btn { font-size: 1.5rem !important; padding: 4px !important; color: var(--white) !important; opacity: 0.9; }
  .skip-btn:hover { opacity: 1; color: var(--gold-light) !important; }
  .nav-btn  { font-size: 1.4rem !important; padding: 4px !important; color: var(--muted) !important; }
  .nav-btn:hover { color: var(--white) !important; }

  /* ── MENU OPEN BUTTON ── */
  .menu-open-btn {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    background: rgba(255,209,102,0.12);
    border: 1.5px solid rgba(255,209,102,0.4);
    color: var(--gold-light); font-size: 1.2rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .menu-open-btn:hover, .menu-open-btn.open { background: rgba(255,209,102,0.25); border-color: var(--gold); color: var(--gold); }

  /* ── BOTTOM SHEET OVERLAY ── */
  #menu-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #menu-overlay.open { opacity: 1; pointer-events: all; }

  /* ── BOTTOM SHEET ── */
  #menu-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
    background: #13132A;
    border-top: 1px solid var(--glass-border);
    border-radius: 24px 24px 0 0;
    padding: 0 0 32px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 85vh; overflow-y: auto;
  }
  #menu-sheet.open { transform: translateY(0); }

  .menu-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.15); margin: 14px auto 8px;
  }
  .menu-track-info {
    padding: 10px 24px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .menu-track-name {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 0.88rem; color: var(--gold-light);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
  }
  .menu-track-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }

  .menu-section { padding: 12px 20px 4px; }
  .menu-section-label {
    font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px;
  }
  .menu-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 20px; }

  .menu-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .mgrid-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 14px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    cursor: pointer; transition: all 0.18s; color: var(--white);
  }
  .mgrid-btn:hover { border-color: var(--gold); background: rgba(255,209,102,0.1); }
  .mgrid-btn.active { border-color: var(--gold); background: rgba(255,209,102,0.18); color: var(--gold); }
  .mg-icon { font-size: 1.4rem; }
  .mg-lbl  { font-size: 0.62rem; color: var(--muted); }
  .mgrid-btn.active .mg-lbl { color: var(--gold); }

  .menu-tool-btns { display: flex; flex-direction: column; gap: 6px; }
  .mtool-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.85rem;
    cursor: pointer; transition: all 0.18s; text-align: left; width: 100%;
  }
  .mtool-btn span:first-child { font-size: 1.1rem; width: 24px; text-align: center; }
  .mtool-btn:hover { border-color: var(--gold); background: rgba(255,209,102,0.08); }
  .mtool-btn.active { border-color: var(--gold); background: rgba(255,209,102,0.15); color: var(--gold-light); }

  /* Ctrl row — 1 sèl ranje kounye a */
  .ctrl-row {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; width: 100%;
  }
  .play-row { gap: 14px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .logo { font-size: 1rem; }
    .hbtn { font-size: 0.65rem; padding: 6px 10px; }
    #header { padding: 10px 14px; }
    .ctrl-btn { font-size: 0.9rem; padding: 4px; }
    .popup-btn { width: 34px; height: 34px; font-size: 0.9rem; }
    #play-btn { width: 44px; height: 44px; font-size: 1.1rem; }
  }
</style>
</head>
