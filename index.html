<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — Music Video Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --abyss: #0A0A0F;
    --deep: #1A1A2E;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --coral: #FF6B6B;
    --teal: #4ECDC4;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(201,168,76,0.2);
  }

  html, body {
    height: 100%;
    background: var(--abyss);
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── AMBIENT BACKGROUND ── */
  #ambient {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(78,205,196,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  #ambient-blur {
    position: fixed; inset: 0; z-index: 0;
    filter: blur(80px);
    opacity: 0;
    transition: opacity 1s;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 380px;
    height: 100vh;
    gap: 0;
  }

  /* ── HEADER ── */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--teal); -webkit-text-fill-color: var(--teal); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .hbtn {
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--gold-light); font-family: 'Inter', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .hbtn:hover { background: rgba(201,168,76,0.12); border-color: var(--gold); }

  /* ── VIDEO ZONE ── */
  #video-zone {
    grid-column: 1; grid-row: 2;
    position: relative; overflow: hidden;
    background: #000;
  }
  #video-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #main-video {
    width: 100%; height: 100%;
    object-fit: contain;
    transition: filter 0.5s;
  }
  /* Video chromatic effect synced to bass */
  #main-video.bass-hit {
    filter: saturate(1.8) contrast(1.1);
  }

  /* Drop overlay */
  #drop-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: opacity 0.3s;
    border: 2px dashed var(--glass-border);
  }
  #drop-overlay.hidden { opacity: 0; pointer-events: none; }
  .drop-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.6; }
  .drop-title {
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem;
    color: var(--gold-light); letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .drop-sub { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
  #file-input { display: none; }

  /* ── SIDEBAR ── */
  #sidebar {
    grid-column: 2; grid-row: 2 / 4;
    display: flex; flex-direction: column;
    border-left: 1px solid var(--glass-border);
    background: rgba(10,10,15,0.6);
    backdrop-filter: blur(30px);
    overflow: hidden;
  }

  /* ── EQUALIZER CANVAS (3D Ring) ── */
  #eq-section {
    flex: 0 0 auto;
    padding: 20px;
    border-bottom: 1px solid var(--glass-border);
    display: flex; flex-direction: column; align-items: center;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 14px; align-self: flex-start;
  }
  #eq-canvas {
    width: 220px; height: 220px;
    display: block;
  }

  /* EQ Mode buttons */
  .eq-modes {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .eq-mode-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em;
    padding: 5px 10px; border-radius: 4px;
    border: 1px solid rgba(201,168,76,0.25);
    background: transparent; color: rgba(255,255,255,0.4);
    cursor: pointer; transition: all 0.2s;
  }
  .eq-mode-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold); color: var(--gold-light);
  }

  /* ── EQ BANDS ── */
  #bands-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .bands-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px; align-items: end;
    height: 80px;
  }
  .band-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    height: 100%;
  }
  .band-slider {
    writing-mode: vertical-lr;
    direction: rtl;
    -webkit-appearance: none; appearance: none;
    width: 4px; flex: 1;
    background: transparent;
    outline: none; cursor: pointer;
  }
  .band-slider::-webkit-slider-track {
    width: 4px;
    background: linear-gradient(to bottom, var(--teal), var(--glass));
    border-radius: 2px;
  }
  .band-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--abyss);
    box-shadow: 0 0 8px rgba(201,168,76,0.6);
    cursor: grab;
  }
  .band-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: rgba(255,255,255,0.35);
    text-align: center;
  }

  /* ── VOLUME & CONTROLS ── */
  #vol-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .vol-row {
    display: flex; align-items: center; gap: 12px;
  }
  .vol-icon { font-size: 1.1rem; cursor: pointer; transition: opacity 0.2s; }
  .vol-icon:hover { opacity: 0.7; }
  #vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--glass); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold-light);
    border: 2px solid var(--abyss);
    box-shadow: 0 0 12px rgba(232,201,122,0.5);
    cursor: grab;
  }
  #vol-slider::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--gold) var(--vol-pct, 80%), var(--glass) 0%);
  }
  #vol-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--gold); min-width: 30px; text-align: right;
  }

  /* Tempo / pitch */
  .slider-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  .slider-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: rgba(255,255,255,0.35);
    min-width: 48px;
  }
  .mini-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .mini-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--teal); cursor: grab;
  }
  .mini-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--teal); min-width: 32px; text-align: right;
  }

  /* ── SHARE PANEL ── */
  #share-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px; border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: rgba(255,255,255,0.7);
    font-family: 'Inter', sans-serif; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s;
  }
  .share-btn:hover { transform: translateY(-1px); border-color: var(--gold); color: var(--gold-light); }
  .share-btn .sicon { font-size: 1rem; }
  .share-full {
    grid-column: 1 / -1; margin-top: 4px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(78,205,196,0.08));
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* ── TRACK INFO ── */
  #info-section {
    flex: 1; padding: 16px 20px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  #track-title {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 0.95rem; color: var(--gold-light);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  #track-meta {
    font-size: 0.72rem; color: rgba(255,255,255,0.35);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── BOTTOM CONTROLS ── */
  #controls {
    grid-column: 1; grid-row: 3;
    padding: 16px 28px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Progress */
  #progress-wrap {
    display: flex; align-items: center; gap: 12px;
  }
  .time-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: rgba(255,255,255,0.4);
    min-width: 38px;
  }
  #progress {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.7);
    cursor: grab;
  }
  #progress::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--gold) var(--prog-pct, 0%), rgba(255,255,255,0.08) 0%);
  }

  /* Playback buttons */
  .ctrl-row {
    display: flex; align-items: center; justify-content: center; gap: 20px;
  }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.5); font-size: 1.1rem;
    transition: all 0.2s; padding: 6px;
  }
  .ctrl-btn:hover { color: var(--gold-light); transform: scale(1.1); }
  #play-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; cursor: pointer; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
    transition: all 0.2s; color: var(--abyss);
  }
  #play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(201,168,76,0.6); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(26,26,46,0.95); border: 1px solid var(--gold);
    color: var(--gold-light); font-family: 'Inter', sans-serif; font-size: 0.8rem;
    padding: 10px 20px; border-radius: 8px;
    opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
    backdrop-filter: blur(20px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FULLSCREEN MODE ── */
  :fullscreen #sidebar { display: none; }
  :fullscreen #app { grid-template-columns: 1fr; }
  :fullscreen #controls { grid-column: 1; }

  /* Mobile */
  @media (max-width: 700px) {
    #app { grid-template-columns: 1fr; grid-template-rows: auto 300px 1fr auto; }
    #video-zone { grid-column: 1; grid-row: 2; }
    #sidebar { grid-column: 1; grid-row: 3; border-left: none; border-top: 1px solid var(--glass-border); flex-direction: row; flex-wrap: wrap; overflow-y: auto; }
    #controls { grid-column: 1; grid-row: 4; }
    #eq-section, #bands-section, #vol-section, #share-section, #info-section { flex: 0 0 100%; }
  }
</style>
</head>
<body>

<div id="ambient"></div>
<div id="ambient-blur"></div>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo">PRI<span>S</span>M</div>
    <div class="header-right">
      <button class="hbtn" onclick="document.getElementById('file-input').click()">▲ Ouvri Fichye</button>
      <button class="hbtn" id="fs-btn" onclick="toggleFullscreen()">⛶ Plein Écran</button>
    </div>
  </header>

  <!-- VIDEO ZONE -->
  <section id="video-zone">
    <div id="video-wrap">
      <video id="main-video" playsinline></video>
    </div>
    <div id="drop-overlay" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">🎬</div>
      <div class="drop-title">Kite yon Video Tonbe Isit</div>
      <div class="drop-sub">MP4 · WebM · MKV · MOV · AVI oswa klike pou chwazi</div>
    </div>
    <input type="file" id="file-input" accept="video/*,audio/*">
  </section>

  <!-- SIDEBAR -->
  <aside id="sidebar">

    <!-- EQ RING -->
    <div id="eq-section">
      <div class="section-label">// Equalizè Sèk</div>
      <canvas id="eq-canvas" width="220" height="220"></canvas>
      <div class="eq-modes">
        <button class="eq-mode-btn active" data-mode="ring" onclick="setEqMode('ring',this)">Ring</button>
        <button class="eq-mode-btn" data-mode="bars" onclick="setEqMode('bars',this)">Bars</button>
        <button class="eq-mode-btn" data-mode="wave" onclick="setEqMode('wave',this)">Wave</button>
        <button class="eq-mode-btn" data-mode="orb" onclick="setEqMode('orb',this)">Orb</button>
      </div>
    </div>

    <!-- EQ BANDS -->
    <div id="bands-section">
      <div class="section-label">// Bann Frekans</div>
      <div class="bands-grid" id="bands-grid"></div>
    </div>

    <!-- VOLUME + PITCH + SPEED -->
    <div id="vol-section">
      <div class="section-label">// Volim & Vitès</div>
      <div class="vol-row">
        <span class="vol-icon" onclick="toggleMute()" id="vol-icon">🔊</span>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8"
               oninput="setVolume(this.value)">
        <span id="vol-val">80%</span>
      </div>
      <div class="slider-row">
        <label>VITÈS</label>
        <input type="range" class="mini-slider" min="0.25" max="3" step="0.05" value="1"
               oninput="setSpeed(this.value)" id="speed-slider">
        <span class="mini-val" id="speed-val">1.00×</span>
      </div>
      <div class="slider-row">
        <label>TONALITE</label>
        <input type="range" class="mini-slider" min="-12" max="12" step="1" value="0"
               oninput="setPitch(this.value)" id="pitch-slider">
        <span class="mini-val" id="pitch-val">±0st</span>
      </div>
    </div>

    <!-- SHARE -->
    <div id="share-section">
      <div class="section-label">// Pataje</div>
      <div class="share-grid">
        <button class="share-btn" onclick="shareWhatsApp()"><span class="sicon">💬</span>WhatsApp</button>
        <button class="share-btn" onclick="shareTelegram()"><span class="sicon">✈️</span>Telegram</button>
        <button class="share-btn" onclick="shareX()"><span class="sicon">𝕏</span>Twitter/X</button>
        <button class="share-btn" onclick="shareFacebook()"><span class="sicon">👤</span>Facebook</button>
        <button class="share-btn share-full" onclick="copyLink()"><span class="sicon">🔗</span>Kopye Lyen</button>
      </div>
    </div>

    <!-- TRACK INFO -->
    <div id="info-section">
      <div id="track-title">—</div>
      <div id="track-meta">Okenn fichye chwazi</div>
    </div>

  </aside>

  <!-- BOTTOM CONTROLS -->
  <div id="controls">
    <div id="progress-wrap">
      <span class="time-label" id="time-cur">0:00</span>
      <input type="range" id="progress" min="0" max="100" value="0"
             oninput="seekTo(this.value)">
      <span class="time-label" id="time-dur" style="text-align:right">0:00</span>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="skip(-10)" title="Retounen 10s">⏪</button>
      <button class="ctrl-btn" onclick="toggleLoop()" id="loop-btn" title="Repete">🔁</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="toggleMute()" title="Silans">🔇</button>
      <button class="ctrl-btn" onclick="skip(10)" title="Avanse 10s">⏩</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  PRISM — Core Audio / Video Engine
// ═══════════════════════════════════════════════

const video   = document.getElementById('main-video');
const canvas  = document.getElementById('eq-canvas');
const ctx     = canvas.getContext('2d');
let audioCtx, analyser, source, gainNode, filters = [], looping = false;
let eqMode = 'ring', muted = false, prevVol = 0.8;
let animFrame;

// Frequency bands
const BANDS = [
  { freq: 60,   label: '60' },
  { freq: 170,  label: '170' },
  { freq: 310,  label: '310' },
  { freq: 600,  label: '600' },
  { freq: 1000, label: '1K' },
  { freq: 3000, label: '3K' },
  { freq: 6000, label: '6K' },
  { freq: 14000,label: '14K' },
];

// ── BUILD BAND SLIDERS ──
function buildBands() {
  const grid = document.getElementById('bands-grid');
  BANDS.forEach((b, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'band-wrap';
    const sl = document.createElement('input');
    sl.type = 'range'; sl.className = 'band-slider';
    sl.min = -12; sl.max = 12; sl.step = 0.5; sl.value = 0;
    sl.oninput = () => applyBandGain(i, +sl.value);
    const lbl = document.createElement('div');
    lbl.className = 'band-label'; lbl.textContent = b.label;
    wrap.appendChild(sl); wrap.appendChild(lbl);
    grid.appendChild(wrap);
  });
}
buildBands();

// ── FILE INPUT ──
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  video.src = url;
  video.play();
  document.getElementById('drop-overlay').classList.add('hidden');
  document.getElementById('track-title').textContent = file.name.replace(/\.[^.]+$/, '');
  const sz = (file.size / 1048576).toFixed(1);
  document.getElementById('track-meta').textContent = `${file.type || 'video'} · ${sz} MB`;
  initAudio();
  updateAmbient(file.name);
});

// Drop zone
const vz = document.getElementById('video-zone');
vz.addEventListener('dragover', e => { e.preventDefault(); });
vz.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) document.getElementById('file-input').dispatchEvent(
    Object.assign(new Event('change'), { target: { files: [file] } })
  );
  // Use direct approach
  if (file) {
    const url = URL.createObjectURL(file);
    video.src = url;
    video.play();
    document.getElementById('drop-overlay').classList.add('hidden');
    document.getElementById('track-title').textContent = file.name.replace(/\.[^.]+$/, '');
    initAudio();
  }
});

// ── AUDIO CONTEXT ──
function initAudio() {
  if (audioCtx) { audioCtx.close(); }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = video.volume;

  // Build EQ filter chain
  filters = BANDS.map(b => {
    const f = audioCtx.createBiquadFilter();
    f.type = 'peaking';
    f.frequency.value = b.freq;
    f.Q.value = 1.2;
    f.gain.value = 0;
    return f;
  });

  source = audioCtx.createMediaElementSource(video);
  // Chain: source → filters → gain → analyser → output
  let node = source;
  filters.forEach(f => { node.connect(f); node = f; });
  node.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  cancelAnimationFrame(animFrame);
  drawEQ();
}

function applyBandGain(i, db) {
  if (filters[i]) filters[i].gain.value = db;
}

// ── PLAYBACK ──
function togglePlay() {
  if (!video.src) { toast('Chwazi yon fichye an premye'); return; }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (video.paused) { video.play(); document.getElementById('play-btn').textContent = '⏸'; }
  else { video.pause(); document.getElementById('play-btn').textContent = '▶'; }
}

function skip(s) { if (video.src) video.currentTime = Math.max(0, video.currentTime + s); }

function toggleLoop() {
  looping = !looping;
  video.loop = looping;
  const btn = document.getElementById('loop-btn');
  btn.style.color = looping ? 'var(--gold)' : '';
  toast(looping ? 'Repete: AKTIF' : 'Repete: DEZAKTIVE');
}

function setVolume(v) {
  video.volume = +v;
  if (gainNode) gainNode.gain.value = +v;
  document.getElementById('vol-val').textContent = Math.round(v * 100) + '%';
  document.getElementById('vol-slider').style.setProperty('--vol-pct', (v * 100) + '%');
  const icon = document.getElementById('vol-icon');
  icon.textContent = +v === 0 ? '🔇' : +v < 0.4 ? '🔈' : +v < 0.7 ? '🔉' : '🔊';
  muted = (+v === 0);
}

function toggleMute() {
  if (muted) { video.volume = prevVol; document.getElementById('vol-slider').value = prevVol; setVolume(prevVol); }
  else { prevVol = video.volume; setVolume(0); document.getElementById('vol-slider').value = 0; }
  muted = !muted;
}

function setSpeed(v) {
  video.playbackRate = +v;
  document.getElementById('speed-val').textContent = (+v).toFixed(2) + '×';
}

function setPitch(v) {
  document.getElementById('pitch-val').textContent = (v >= 0 ? '+' : '') + v + 'st';
  // Note: native pitch shift needs AudioWorklet; showing UI state
}

function seekTo(pct) {
  if (video.duration) video.currentTime = (pct / 100) * video.duration;
}

// Progress update
video.addEventListener('timeupdate', () => {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  const prog = document.getElementById('progress');
  prog.value = pct;
  prog.style.setProperty('--prog-pct', pct + '%');
  document.getElementById('time-cur').textContent = fmt(video.currentTime);
  document.getElementById('time-dur').textContent = fmt(video.duration);
});

video.addEventListener('ended', () => {
  document.getElementById('play-btn').textContent = '▶';
});

function fmt(s) {
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

// ── FULLSCREEN ──
function toggleFullscreen() {
  if (!document.fullscreenElement) document.getElementById('app').requestFullscreen?.();
  else document.exitFullscreen?.();
}

// ── AMBIENT COLOR from video ──
function updateAmbient(name) {
  const colors = ['#C9A84C','#4ECDC4','#FF6B6B','#9B59B6','#3498DB'];
  const c = colors[name.length % colors.length];
  const blur = document.getElementById('ambient-blur');
  blur.style.background = `radial-gradient(ellipse at 50% 50%, ${c}33 0%, transparent 70%)`;
  blur.style.opacity = '1';
}

// ═══════════════════════════════════════════════
//  EQUALIZER VISUALIZER — Multi-mode
// ═══════════════════════════════════════════════

function setEqMode(mode, btn) {
  eqMode = mode;
  document.querySelectorAll('.eq-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function drawEQ() {
  animFrame = requestAnimationFrame(drawEQ);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  let data;
  if (!analyser) {
    // Demo idle animation
    data = new Uint8Array(64).fill(0).map((_,i) =>
      100 + 40 * Math.sin(Date.now()/800 + i * 0.5) * Math.random()
    );
  } else {
    data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
  }

  if (eqMode === 'ring') drawRing(data, W, H);
  else if (eqMode === 'bars') drawBars(data, W, H);
  else if (eqMode === 'wave') drawWave(data, W, H);
  else if (eqMode === 'orb') drawOrb(data, W, H);
}

// MODE 1: 3D Circular Ring (signature element)
function drawRing(data, W, H) {
  const cx = W/2, cy = H/2;
  const bars = 72;
  const r0 = 55, rMax = 90;
  const t = Date.now();
  const avg = avg8(data);

  // Glow ring base
  ctx.beginPath();
  ctx.arc(cx, cy, r0 + avg * 0.08, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(201,168,76,${0.15 + avg * 0.002})`;
  ctx.lineWidth = 2 + avg * 0.04;
  ctx.stroke();

  // Inner pulse circle
  const pulse = r0 * 0.55 + avg * 0.12;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse);
  grd.addColorStop(0, `rgba(201,168,76,${0.12 + avg*0.002})`);
  grd.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(cx, cy, pulse, 0, Math.PI*2);
  ctx.fillStyle = grd; ctx.fill();

  // Ring bars
  for (let i = 0; i < bars; i++) {
    const angle = (i / bars) * Math.PI * 2 - Math.PI/2;
    const idx = Math.floor((i / bars) * (data.length * 0.6));
    const val = data[idx] / 255;
    const len = val * (rMax - r0) + 2;

    const spin = t * 0.0003;
    const a = angle + spin;
    const x1 = cx + Math.cos(a) * r0;
    const y1 = cy + Math.sin(a) * r0;
    const x2 = cx + Math.cos(a) * (r0 + len);
    const y2 = cy + Math.sin(a) * (r0 + len);

    // Color by frequency
    const hue = 35 + (i / bars) * 160;
    const alpha = 0.5 + val * 0.5;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = `hsla(${hue},80%,65%,${alpha})`;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Center logo dot
  ctx.beginPath();
  ctx.arc(cx, cy, 8 + avg * 0.04, 0, Math.PI*2);
  const c2 = ctx.createRadialGradient(cx,cy,0,cx,cy,10);
  c2.addColorStop(0,'rgba(232,201,122,0.9)');
  c2.addColorStop(1,'rgba(201,168,76,0)');
  ctx.fillStyle = c2; ctx.fill();
}

// MODE 2: Classic bars
function drawBars(data, W, H) {
  const bars = 48, bw = W / bars;
  const avg = avg8(data);
  for (let i = 0; i < bars; i++) {
    const idx = Math.floor((i / bars) * (data.length * 0.7));
    const val = data[idx] / 255;
    const bh = val * H * 0.85;
    const x = i * bw, y = H - bh;
    const hue = 30 + val * 160;
    const grd = ctx.createLinearGradient(x, y, x, H);
    grd.addColorStop(0, `hsla(${hue},80%,65%,0.9)`);
    grd.addColorStop(1, `hsla(${hue},80%,40%,0.3)`);
    ctx.fillStyle = grd;
    ctx.fillRect(x + 1, y, bw - 2, bh);
  }
}

// MODE 3: Wave
function drawWave(data, W, H) {
  const waveData = new Uint8Array(analyser ? analyser.fftSize : 128);
  if (analyser) analyser.getByteTimeDomainData(waveData);
  else waveData.fill(128);

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(201,168,76,0.8)';
  ctx.lineWidth = 2;
  const sl = W / waveData.length;
  for (let i = 0; i < waveData.length; i++) {
    const x = i * sl;
    const y = ((waveData[i] / 128) - 1) * H * 0.4 + H/2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Second wave offset
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(78,205,196,0.4)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < waveData.length; i++) {
    const x = i * sl;
    const y = ((waveData[i] / 128) - 1) * H * 0.25 + H * 0.35;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// MODE 4: Orb (morphing blob)
function drawOrb(data, W, H) {
  const cx = W/2, cy = H/2;
  const t = Date.now() * 0.001;
  const avg = avg8(data);
  const r = 50 + avg * 0.25;
  const pts = 48;

  ctx.beginPath();
  for (let i = 0; i <= pts; i++) {
    const a = (i / pts) * Math.PI * 2;
    const idx = Math.floor((i / pts) * (data.length * 0.5));
    const noise = (data[idx] / 255) * 22;
    const rr = r + noise + 8 * Math.sin(a * 4 + t);
    const x = cx + Math.cos(a) * rr;
    const y = cy + Math.sin(a) * rr;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + 30);
  grd.addColorStop(0, `rgba(201,168,76,${0.3 + avg * 0.002})`);
  grd.addColorStop(0.5, `rgba(78,205,196,${0.15 + avg * 0.001})`);
  grd.addColorStop(1, 'rgba(255,107,107,0)');
  ctx.fillStyle = grd; ctx.fill();
  ctx.strokeStyle = `rgba(232,201,122,0.5)`;
  ctx.lineWidth = 1.5; ctx.stroke();
}

function avg8(data) {
  if (!data.length) return 0;
  return data.slice(0, Math.min(8, data.length)).reduce((a, b) => a + b, 0) / 8;
}

// Start idle EQ animation
drawEQ();

function copyLink() {
  if (navigator.share) {
    navigator.share({ title: 'PRISM Player', url: window.location.href })
      .then(() => toast('Pataje reyisi! ✓'))
      .catch(() => {});
  } else {
    navigator.clipboard.writeText(window.location.href)
      .then(() => toast('Lyen kopye! ✓'))
      .catch(() => toast('Pa kapab kopye'));
  }
}

// ── TOAST ──
function toast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), dur);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') skip(-5);
  if (e.code === 'ArrowRight') skip(5);
  if (e.code === 'KeyM') toggleMute();
  if (e.code === 'KeyF') toggleFullscreen();
  if (e.code === 'KeyL') toggleLoop();
});
