<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — Music Video Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --abyss: #0D0D14;
    --deep: #16162A;
    --gold: #FFD166;
    --gold-light: #FFE599;
    --coral: #FF6B6B;
    --teal: #06D6A0;
    --white: #F4F4F8;
    --muted: #A0A0B8;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,209,102,0.35);
  }

  html { overflow: hidden; height: 100%; }
  body {
    overflow: hidden; height: 100%; max-width: 100vw;
    background: var(--abyss); color: var(--white);
    font-family: 'Inter', sans-serif;
  }

  /* ── AMBIENT BACKGROUND ── */
  #ambient {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(78,205,196,0.04) 0%, transparent 50%);
    pointer-events: none;
  }
  #ambient-blur {
    position: fixed; inset: 0; z-index: 0;
    filter: blur(80px); opacity: 0; transition: opacity 1s;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  #app {
    position: fixed; inset: 0; z-index: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    min-height: 0;
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { color: var(--teal); -webkit-text-fill-color: var(--teal); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .hbtn {
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--white); font-family: 'Inter', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .hbtn:hover { background: rgba(255,209,102,0.15); border-color: var(--gold); }

  /* ── VIDEO ZONE ── */
  #video-zone {
    grid-column: 1; grid-row: 2;
    position: relative; overflow: hidden;
    background: #000;
  }
  #video-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #main-video {
    width: 100%; height: 100%;
    object-fit: contain;
    transition: filter 0.5s;
  }
  /* Video chromatic effect synced to bass */
  #main-video.bass-hit {
    filter: saturate(1.8) contrast(1.1);
  }

  /* Drop overlay */
  #drop-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: opacity 0.3s;
    border: 2px dashed var(--glass-border);
  }
  #drop-overlay.hidden { display: none; }
  .drop-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.6; }
  .drop-title {
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem;
    color: var(--white); letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .drop-sub { font-size: 0.8rem; color: var(--muted); }
  #file-input { display: none; }

  /* ── SIDEBAR — hidden, content moved to popups ── */
  #sidebar { display: none; }

  /* ── EQUALIZER CANVAS (3D Ring) ── */
  #eq-section {
    flex: 0 0 auto;
    padding: 20px;
    border-bottom: 1px solid var(--glass-border);
    display: flex; flex-direction: column; align-items: center;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 14px; align-self: flex-start;
  }
  #eq-canvas {
    width: 220px; height: 220px;
    display: block;
  }

  /* EQ Mode buttons */
  .eq-modes {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .eq-mode-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em;
    padding: 5px 10px; border-radius: 4px;
    border: 1px solid rgba(255,209,102,0.3);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .eq-mode-btn.active {
    background: rgba(255,209,102,0.2);
    border-color: var(--gold); color: var(--gold-light);
    font-weight: 600;
  }

  /* ── EQ BANDS ── */
  #bands-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .bands-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px; align-items: end;
    height: 80px;
  }
  .band-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    height: 100%;
  }
  .band-slider {
    writing-mode: vertical-lr;
    direction: rtl;
    -webkit-appearance: none; appearance: none;
    width: 4px; flex: 1;
    background: transparent;
    outline: none; cursor: pointer;
  }
  .band-slider::-webkit-slider-track {
    width: 4px;
    background: linear-gradient(to bottom, var(--teal), var(--glass));
    border-radius: 2px;
  }
  .band-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--abyss);
    box-shadow: 0 0 8px rgba(201,168,76,0.6);
    cursor: grab;
  }
  .band-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--muted);
    text-align: center;
  }

  /* ── VOLUME & CONTROLS ── */
  #vol-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .vol-row {
    display: flex; align-items: center; gap: 12px;
  }
  .vol-icon { font-size: 1.1rem; cursor: pointer; transition: opacity 0.2s; }
  .vol-icon:hover { opacity: 0.7; }
  #vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--glass); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold-light);
    border: 2px solid var(--abyss);
    box-shadow: 0 0 12px rgba(232,201,122,0.5);
    cursor: grab;
  }
  #vol-slider::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--gold) var(--vol-pct, 80%), var(--glass) 0%);
  }
  #vol-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--white); min-width: 30px; text-align: right;
  }

  /* Tempo / pitch */
  .slider-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  .slider-row label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    min-width: 48px;
  }
  .mini-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .mini-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--teal); cursor: grab;
  }
  .mini-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--white); min-width: 32px; text-align: right;
  }

  /* ── SHARE PANEL ── */
  #share-section {
    flex: 0 0 auto;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
  }
  .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px; border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--white);
    font-family: 'Inter', sans-serif; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s;
  }
  .share-btn:hover { transform: translateY(-1px); border-color: var(--gold); color: var(--gold-light); }
  .share-btn .sicon { font-size: 1rem; }
  .share-full {
    grid-column: 1 / -1; margin-top: 4px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(78,205,196,0.08));
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* ── TRACK INFO ── */
  #info-section {
    flex: 1; padding: 16px 20px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  #track-title {
    font-family: 'Orbitron', sans-serif; font-weight: 700;
    font-size: 0.95rem; color: var(--gold-light);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  #track-meta {
    font-size: 0.72rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── BOTTOM CONTROLS ── */
  #controls {
    grid-column: 1; grid-row: 3;
    padding: 10px 16px 14px;
    background: rgba(13,13,20,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    display: flex; flex-direction: column; gap: 8px;
    position: relative; min-height: 0; overflow: visible;
  }
  #progress-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .time-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; color: var(--muted);
    min-width: 34px;
  }
  #progress {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.08); outline: none; cursor: pointer;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.7);
    cursor: grab;
  }
  #progress::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--gold) var(--prog-pct, 0%), rgba(255,255,255,0.08) 0%);
  }

  /* Playback buttons */
  .ctrl-row {
    display: flex; align-items: center; justify-content: center;
    gap: clamp(3px, 1.5vw, 10px); flex-wrap: nowrap;
    overflow: hidden; width: 100%;
  }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem;
    transition: all 0.2s; padding: 5px; flex-shrink: 0;
  }
  .ctrl-btn:hover { color: var(--gold-light); transform: scale(1.1); }
  #play-btn {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; cursor: pointer; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
    transition: all 0.2s; color: var(--abyss);
  }
  #play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(201,168,76,0.6); }

  /* ── POPUP PANELS (EQ, Bann, Volim, Pataje) ── */
  .popup-panel {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%; transform: translateX(-50%);
    background: #16162A;
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.85);
    display: none; flex-direction: column; gap: 14px;
    z-index: 100;
    width: min(320px, 92vw);
    max-height: 70vh; overflow-y: auto;
  }
  .popup-panel.open { display: flex; }

  /* EQ popup */
  #eq-popup { width: min(320px, 92vw); }
  #eq-popup .eq-canvas-wrap { display: flex; justify-content: center; }
  #eq-popup canvas { width: 140px; height: 140px; display: block; }
  .eq-popup-modes { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }

  /* Bands popup */
  #bands-popup { width: min(340px, 92vw); }
  .bands-grid {
    display: grid; grid-template-columns: repeat(8,1fr);
    gap: 6px; align-items: end; height: 90px;
  }
  .band-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .band-slider {
    writing-mode: vertical-lr; direction: rtl;
    -webkit-appearance: none; appearance: none;
    width: 4px; flex: 1; background: transparent; outline: none; cursor: pointer;
  }
  .band-slider::-webkit-slider-track {
    width: 4px;
    background: linear-gradient(to bottom, var(--teal), rgba(6,214,160,0.15));
    border-radius: 2px;
  }
  .band-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); border: 2px solid var(--abyss);
    box-shadow: 0 0 8px rgba(255,209,102,0.5); cursor: grab;
  }
  .band-label { font-family:'JetBrains Mono',monospace; font-size:0.5rem; color:var(--muted); text-align:center; }
  .bands-reset {
    background: transparent; border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted); font-family:'Inter',sans-serif; font-size:0.72rem;
    padding: 6px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    align-self: flex-end;
  }
  .bands-reset:hover { border-color: var(--gold); color: var(--gold); }

  /* Volume popup */
  #vol-popup { width: min(300px, 92vw); }
  .vol-row { display: flex; align-items: center; gap: 12px; }
  .vol-icon { font-size: 1.2rem; cursor: pointer; }
  #vol-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px;
    outline: none; cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: var(--gold-light); border: 2px solid var(--abyss);
    box-shadow: 0 0 12px rgba(255,229,153,0.5); cursor: grab;
  }
  #vol-slider::-webkit-slider-runnable-track {
    height: 5px; border-radius: 3px;
    background: linear-gradient(to right, var(--gold) var(--vol-pct,80%), rgba(255,255,255,0.1) 0%);
  }
  #vol-val { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--white); min-width:34px; text-align:right; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--muted); min-width:52px; }
  .mini-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  .mini-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: var(--teal); cursor: grab;
  }
  .mini-val { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--white); min-width:34px; text-align:right; }

  /* Share popup */
  #share-popup { width: min(290px, 92vw); }
  .share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px; border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--white);
    font-family:'Inter',sans-serif; font-size:0.75rem;
    cursor: pointer; transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--gold); color: var(--gold-light); background: rgba(255,209,102,0.08); }
  .share-btn .sicon { font-size: 1rem; }
  .share-full { grid-column: 1/-1; border-color: rgba(255,209,102,0.4); color: var(--gold-light); }

  /* ── POPUP ACTION BUTTONS (in ctrl-row) ── */
  .popup-btn {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: var(--white); font-size: 0.95rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .popup-btn:hover { border-color: var(--gold); color: var(--gold-light); background: rgba(255,209,102,0.12); }
  .popup-btn.active {
    background: rgba(255,209,102,0.2);
    border-color: var(--gold); color: var(--gold);
    box-shadow: 0 0 14px rgba(255,209,102,0.3);
  }

  /* Skip -10/+10 nav buttons */
  .nav-btn {
    font-size: 1.1rem !important; padding: 4px 1px !important;
    color: var(--muted) !important; flex-shrink: 0;
  }
  .nav-btn:hover { color: var(--white) !important; }

  /* Prev/Next track skip buttons */
  .skip-btn {
    font-size: 1.2rem !important; padding: 4px 1px !important;
    color: var(--white) !important; flex-shrink: 0; opacity: 0.85;
  }
  .skip-btn:hover { opacity: 1; color: var(--gold-light) !important; }

  /* Fullscreen btn in header — ikòn sèlman, kare */
  #fs-btn {
    width: 36px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; border-radius: 8px;
  }

  /* Progress */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(26,26,46,0.95); border: 1px solid var(--gold);
    color: var(--gold-light); font-family: 'Inter', sans-serif; font-size: 0.8rem;
    padding: 10px 20px; border-radius: 8px;
    opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
    backdrop-filter: blur(20px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FULLSCREEN MODE ── */
  :fullscreen #sidebar { display: none; }
  :fullscreen #app { grid-template-columns: 1fr; }
  :fullscreen #controls { grid-column: 1; }

  /* Open buttons on drop overlay */
  .open-btn {
    background: rgba(255,209,102,0.15);
    border: 1.5px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Inter', sans-serif; font-size: 0.85rem;
    padding: 10px 20px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s;
  }
  .open-btn:hover { background: rgba(255,209,102,0.28); }

  /* Audio mode — big EQ shown when playing audio-only */
  #audio-mode {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: var(--abyss);
    flex-direction: column;
  }
  #audio-mode.active { display: flex; }
  #eq-fullscreen { width: min(360px, 88vw); height: min(360px, 88vw); display: block; }
  #audio-art {
    font-size: 0.9rem; letter-spacing: 0.25em;
    color: var(--gold); opacity: 0.35;
    font-family: 'Orbitron', sans-serif;
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }

  /* Playlist popup */
  #playlist-popup { width: min(340px, 92vw); }
  #playlist-list {
    display: flex; flex-direction: column; gap: 3px;
    overflow-y: auto; max-height: 42vh;
    scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
  }
  .pl-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s; min-width: 0;
  }
  .pl-item:hover { background: rgba(255,209,102,0.08); border-color: rgba(255,209,102,0.2); }
  .pl-item.playing { background: rgba(255,209,102,0.14); border-color: var(--gold); }
  .pl-icon { font-size: 0.95rem; flex-shrink: 0; }
  .pl-name {
    font-size: 0.74rem; color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .pl-item.playing .pl-name { color: var(--gold-light); font-weight: 600; }
  .pl-dur { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); flex-shrink: 0; }
  .pl-empty { font-size: 0.78rem; color: var(--muted); text-align: center; padding: 20px 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .logo { font-size: 1rem; }
    .hbtn { font-size: 0.65rem; padding: 6px 10px; }
    #header { padding: 10px 14px; }
    .ctrl-btn { font-size: 0.9rem; padding: 4px; }
    .popup-btn { width: 34px; height: 34px; font-size: 0.9rem; }
    #play-btn { width: 44px; height: 44px; font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div id="ambient"></div>
<div id="ambient-blur"></div>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo">PRI<span>S</span>M</div>
    <div class="header-right">
      <button class="hbtn" onclick="document.getElementById('file-input').click()">▲ Ajoute</button>
      <button class="hbtn" onclick="openFolder()" title="Ouvri yon dosye (Chrome)">📁</button>
      <button class="hbtn" id="fs-btn" onclick="toggleFullscreen()" title="Agrandi / Redwi">⛶</button>
    </div>
  </header>

  <!-- VIDEO ZONE -->
  <section id="video-zone">
    <div id="video-wrap">
      <video id="main-video" playsinline></video>
    </div>
    <div id="drop-overlay">
      <div class="drop-icon">🎵</div>
      <div class="drop-title">PRISM Player</div>
      <div class="drop-sub" style="margin-bottom:24px">Chwazi fichye ou yo — plizyè alafwa</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button class="open-btn" onclick="document.getElementById('file-input').click()">🎵 Chwazi Fichye</button>
        <button class="open-btn" id="folder-btn" style="display:none" onclick="openFolder()">📁 Ouvri Dosye</button>
      </div>
    </div>
    <input type="file" id="file-input" accept="video/*,audio/*,.mp4,.webm,.mkv,.mov,.avi,.mp3,.wav,.ogg,.flac,.aac,.m4a,.opus" multiple style="display:none">
    <input type="file" id="folder-input" webkitdirectory multiple style="display:none">

    <!-- AUDIO MODE: big EQ display shown when playing music -->
    <div id="audio-mode">
      <canvas id="eq-fullscreen" width="400" height="400"></canvas>
      <div id="audio-art">♪</div>
    </div>
  </section>

  <!-- hidden elements for JS refs -->
  <div style="display:none">
    <div id="track-title"></div>
    <div id="track-meta"></div>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div id="controls">

    <!-- POPUP: PLAYLIST -->
    <div id="playlist-popup" class="popup-panel">
      <div class="section-label" style="margin-bottom:0">// Playlist — <span id="pl-count">0 fichye</span></div>
      <div id="playlist-list"><div class="pl-empty">Pa gen fichye ankò</div></div>
    </div>

    <!-- POPUP: EQ VIZYAL -->
    <div id="eq-popup" class="popup-panel">
      <div class="section-label" style="margin-bottom:0">// Equalizè Vizyal</div>
      <div class="eq-canvas-wrap">
        <canvas id="eq-canvas" width="160" height="160"></canvas>
      </div>
      <div class="eq-popup-modes">
        <button class="eq-mode-btn active" onclick="setEqMode('ring',this)">Ring</button>
        <button class="eq-mode-btn" onclick="setEqMode('bars',this)">Bars</button>
        <button class="eq-mode-btn" onclick="setEqMode('wave',this)">Wave</button>
        <button class="eq-mode-btn" onclick="setEqMode('orb',this)">Orb</button>
      </div>
    </div>

    <!-- POPUP: BANN FREKANS -->
    <div id="bands-popup" class="popup-panel">
      <div class="section-label" style="margin-bottom:0">// Bann Frekans</div>
      <div class="bands-grid" id="bands-grid"></div>
      <button class="bands-reset" onclick="resetBands()">↺ Remèt Nòmal</button>
    </div>

    <!-- POPUP: VOLIM & VITÈS -->
    <div id="vol-popup" class="popup-panel">
      <div class="section-label" style="margin-bottom:0">// Volim & Vitès</div>
      <div class="vol-row">
        <span class="vol-icon" onclick="toggleMute()" id="vol-icon">🔊</span>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
        <span id="vol-val">80%</span>
      </div>
      <div class="slider-row">
        <label>VITÈS</label>
        <input type="range" class="mini-slider" min="0.25" max="3" step="0.05" value="1" oninput="setSpeed(this.value)" id="speed-slider">
        <span class="mini-val" id="speed-val">1.00×</span>
      </div>
      <div class="slider-row">
        <label>TONALITE</label>
        <input type="range" class="mini-slider" min="-12" max="12" step="1" value="0" oninput="setPitch(this.value)" id="pitch-slider">
        <span class="mini-val" id="pitch-val">±0st</span>
      </div>
    </div>

    <!-- POPUP: PATAJE -->
    <div id="share-popup" class="popup-panel">
      <div class="section-label" style="margin-bottom:0">// Pataje</div>
      <div class="share-grid">
        <button class="share-btn" onclick="shareWhatsApp()"><span class="sicon">💬</span>WhatsApp</button>
        <button class="share-btn" onclick="shareTelegram()"><span class="sicon">✈️</span>Telegram</button>
        <button class="share-btn" onclick="shareX()"><span class="sicon">𝕏</span>Twitter/X</button>
        <button class="share-btn" onclick="shareFacebook()"><span class="sicon">👤</span>Facebook</button>
        <button class="share-btn share-full" onclick="copyLink()"><span class="sicon">🔗</span>Kopye Lyen</button>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div id="progress-wrap">
      <span class="time-label" id="time-cur">0:00</span>
      <input type="range" id="progress" min="0" max="100" value="0" oninput="seekTo(this.value)">
      <span class="time-label" id="time-dur" style="text-align:right">0:00</span>
    </div>

    <!-- CTRL ROW -->
    <div class="ctrl-row">
      <button class="popup-btn" id="bands-btn"    onclick="togglePanel('bands-popup','bands-btn')"      title="Bann Frekans">🎛</button>
      <button class="popup-btn" id="vol-btn"      onclick="togglePanel('vol-popup','vol-btn')"          title="Volim & Vitès">🔊</button>

      <!-- PREV — BACK10 — PLAY — FWD10 — NEXT -->
      <button class="ctrl-btn skip-btn" onclick="playPrev()" title="Trak anvan">⏮</button>
      <button class="ctrl-btn nav-btn"  onclick="skip(-10)"  title="Retounen 10s">↺</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn nav-btn"  onclick="skip(10)"   title="Avanse 10s">↻</button>
      <button class="ctrl-btn skip-btn" onclick="playNext()" title="Trak swivan">⏭</button>

      <button class="popup-btn" id="loop-btn"         onclick="toggleLoop()"                                   title="Repete">🔁</button>
      <button class="popup-btn" id="eq-btn"           onclick="togglePanel('eq-popup','eq-btn')"               title="Equalizè">≋</button>
      <button class="popup-btn" id="playlist-btn"     onclick="togglePanel('playlist-popup','playlist-btn')"   title="Playlist">☰</button>
      <button class="popup-btn" id="share-btn-toggle" onclick="togglePanel('share-popup','share-btn-toggle')" title="Pataje">↗</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  PRISM — Core Engine
// ═══════════════════════════════════════════════

const video    = document.getElementById('main-video');
const canvas   = document.getElementById('eq-canvas');
const ctx      = canvas.getContext('2d');
const canvasFull = document.getElementById('eq-fullscreen');
const ctxFull    = canvasFull.getContext('2d');

let audioCtx, analyser, source, gainNode, filters = [], looping = false;
let eqMode = 'ring', muted = false, prevVol = 0.8;
let animFrame, animFrameFull;

// Playlist state
let playlist = [];   // [{name, url, type, isAudio}]
let currentIdx = -1;

// Frequency bands
const BANDS = [
  { freq: 60, label: '60' }, { freq: 170, label: '170' },
  { freq: 310, label: '310' }, { freq: 600, label: '600' },
  { freq: 1000, label: '1K' }, { freq: 3000, label: '3K' },
  { freq: 6000, label: '6K' }, { freq: 14000, label: '14K' },
];

// ── BUILD BAND SLIDERS ──
function buildBands() {
  const grid = document.getElementById('bands-grid');
  BANDS.forEach((b, i) => {
    const wrap = document.createElement('div'); wrap.className = 'band-wrap';
    const sl = document.createElement('input');
    sl.type = 'range'; sl.className = 'band-slider';
    sl.min = -12; sl.max = 12; sl.step = 0.5; sl.value = 0;
    sl.oninput = () => applyBandGain(i, +sl.value);
    const lbl = document.createElement('div');
    lbl.className = 'band-label'; lbl.textContent = b.label;
    wrap.appendChild(sl); wrap.appendChild(lbl);
    grid.appendChild(wrap);
  });
}
// Montre bouton dosye sèlman si navigatè a sipòte li
if (window.showDirectoryPicker) {
  document.getElementById('folder-btn').style.display = '';
  document.getElementById('fs-btn').style.display = ''; // fullscreen tou
}

// header folder btn visibility
const hdrFolder = document.querySelector('.hbtn[onclick="openFolder()"]');
if (hdrFolder && !window.showDirectoryPicker) hdrFolder.style.display = 'none';

buildBands();

// ── PANEL TOGGLE SYSTEM ──
const ALL_PANELS = ['eq-popup','bands-popup','vol-popup','share-popup','playlist-popup'];
const ALL_BTNS   = ['eq-btn','bands-btn','vol-btn','share-btn-toggle','playlist-btn','loop-btn'];

function togglePanel(panelId, btnId) {
  const isOpen = document.getElementById(panelId).classList.contains('open');
  ALL_PANELS.forEach(p => document.getElementById(p).classList.remove('open'));
  // Close panel btns only (not loop-btn which has no panel)
  ['eq-btn','bands-btn','vol-btn','share-btn-toggle','playlist-btn'].forEach(b => document.getElementById(b).classList.remove('active'));
  if (!isOpen) {
    document.getElementById(panelId).classList.add('open');
    document.getElementById(btnId).classList.add('active');
  }
}
document.addEventListener('click', e => {
  const insidePanel = ALL_PANELS.some(p => document.getElementById(p).contains(e.target));
  const insideBtn   = ALL_BTNS.some(b => document.getElementById(b).contains(e.target));
  if (!insidePanel && !insideBtn) {
    ALL_PANELS.forEach(p => document.getElementById(p).classList.remove('open'));
    ALL_BTNS.forEach(b => document.getElementById(b).classList.remove('active'));
  }
});

function playPrev() { if (currentIdx > 0) playIdx(currentIdx - 1); }
function playNext() { if (currentIdx < playlist.length - 1) playIdx(currentIdx + 1); }

// ── OPEN FOLDER ──
function openFolder() {
  // showDirectoryPicker — Chrome 86+ desktop
  if (window.showDirectoryPicker) {
    window.showDirectoryPicker({ mode: 'read' }).then(async dirHandle => {
      const MEDIA = /\.(mp4|webm|mkv|mov|avi|mp3|wav|ogg|flac|aac|m4a|opus)$/i;
      const files = [];
      for await (const entry of dirHandle.values()) {
        if (entry.kind === 'file') {
          const f = await entry.getFile();
          if (/^(video|audio)\//.test(f.type) || MEDIA.test(f.name)) files.push(f);
        }
      }
      if (!files.length) { toast('Pa gen fichye media nan dosye sa'); return; }
      files.sort((a, b) => a.name.localeCompare(b.name));
      addToPlaylist(files);
      if (currentIdx < 0) playIdx(0);
    }).catch(e => {
      if (e.name !== 'AbortError') {
        // Fallback webkitdirectory
        document.getElementById('folder-input').click();
      }
    });
  } else {
    // SPCK / Firefox / Safari — webkitdirectory
    document.getElementById('folder-input').click();
  }
}

// folder-input fallback listener
document.getElementById('folder-input').addEventListener('change', e => {
  const MEDIA = /\.(mp4|webm|mkv|mov|avi|mp3|wav|ogg|flac|aac|m4a|opus)$/i;
  const files = Array.from(e.target.files).filter(f =>
    /^(video|audio)\//.test(f.type) || MEDIA.test(f.name)
  );
  if (!files.length) { toast('Pa gen fichye media nan dosye sa'); return; }
  files.sort((a, b) => a.name.localeCompare(b.name));
  addToPlaylist(files);
  if (currentIdx < 0) playIdx(0);
  e.target.value = '';
});
document.getElementById('file-input').addEventListener('change', e => {
  const MEDIA = /\.(mp4|webm|mkv|mov|avi|mp3|wav|ogg|flac|aac|m4a|opus)$/i;
  const files = Array.from(e.target.files).filter(f =>
    /^(video|audio)\//.test(f.type) || MEDIA.test(f.name)
  );
  if (!files.length) { toast('Pa gen fichye rekonèt'); return; }
  files.sort((a, b) => a.name.localeCompare(b.name));
  addToPlaylist(files);
  if (currentIdx < 0) playIdx(0);
  e.target.value = '';
});

// Drag & drop (multiple)
const vz = document.getElementById('video-zone');
vz.addEventListener('dragover', e => { e.preventDefault(); });
vz.addEventListener('drop', e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files).filter(f =>
    /^(video|audio)\//.test(f.type) || /\.(mp4|webm|mkv|mov|avi|mp3|wav|ogg|flac|aac|m4a|opus)$/i.test(f.name)
  );
  if (!files.length) return;
  addToPlaylist(files);
  if (currentIdx < 0) playIdx(0);
});

// ── PLAYLIST MANAGEMENT ──
function addToPlaylist(files) {
  const isAudioType = f => /^audio\//.test(f.type) || /\.(mp3|wav|ogg|flac|aac|m4a|opus)$/i.test(f.name);
  files.forEach(f => {
    playlist.push({ name: f.name.replace(/\.[^.]+$/, ''), url: URL.createObjectURL(f), type: f.type, isAudio: isAudioType(f) });
  });
  renderPlaylist();
  document.getElementById('drop-overlay').classList.add('hidden');
}

function renderPlaylist() {
  const list = document.getElementById('playlist-list');
  document.getElementById('pl-count').textContent = `${playlist.length} fichye`;
  if (!playlist.length) { list.innerHTML = '<div class="pl-empty">Pa gen fichye ankò</div>'; return; }
  list.innerHTML = '';
  playlist.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'pl-item' + (i === currentIdx ? ' playing' : '');
    div.innerHTML = `<span class="pl-icon">${item.isAudio ? '🎵' : '🎬'}</span>
      <span class="pl-name">${item.name}</span>`;
    div.onclick = () => playIdx(i);
    list.appendChild(div);
  });
}

function playIdx(i) {
  if (i < 0 || i >= playlist.length) return;
  currentIdx = i;
  const item = playlist[i];

  video.src = item.url;
  video.load();
  document.getElementById('track-title').textContent = item.name;
  document.getElementById('track-meta').textContent = item.isAudio ? '🎵 Mizik' : '🎬 Video';

  setMediaMode(item.isAudio);
  updateAmbient(item.name);
  renderPlaylist();

  video.addEventListener('canplay', function onCanPlay() {
    video.removeEventListener('canplay', onCanPlay);
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    video.play().then(() => {
      document.getElementById('play-btn').textContent = '⏸';
    }).catch(() => {});
  }, { once: true });
}

function setMediaMode(isAudio) {
  const audioMode = document.getElementById('audio-mode');
  const videoEl   = document.getElementById('main-video');
  if (isAudio) {
    audioMode.classList.add('active');
    videoEl.style.display = 'none';
    document.getElementById('audio-art').textContent = playlist[currentIdx]?.name || '♪';
    startFullEQ();
  } else {
    audioMode.classList.remove('active');
    videoEl.style.display = '';
    cancelAnimationFrame(animFrameFull);
  }
}

// Auto-play next track
video.addEventListener('ended', () => {
  document.getElementById('play-btn').textContent = '▶';
  if (looping) { video.play(); document.getElementById('play-btn').textContent = '⏸'; return; }
  if (currentIdx + 1 < playlist.length) playIdx(currentIdx + 1);
});

// ── AUDIO CONTEXT — kreye yon sèl fwa, rekonekte pou chak trak ──
let audioReady = false;

function initAudio() {
  if (!audioReady) {
    // Premye fwa: kreye tout nœud yo
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 1.0; // kòmanse a 100% — setVolume ap ajiste

    filters = BANDS.map(b => {
      const f = audioCtx.createBiquadFilter();
      f.type = 'peaking'; f.frequency.value = b.freq; f.Q.value = 1.2; f.gain.value = 0;
      return f;
    });
    // Restore band slider values
    document.querySelectorAll('.band-slider').forEach((sl, i) => {
      if (filters[i]) filters[i].gain.value = +sl.value;
    });

    // Chain: filters → gain → analyser → output
    let node = gainNode;
    // Konekte filters anvan gain
    const firstFilter = filters[0];
    let fNode = firstFilter;
    for (let i = 1; i < filters.length; i++) { fNode.connect(filters[i]); fNode = filters[i]; }
    fNode.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(audioCtx.destination);

    // Source — kreye yon sèl fwa
    source = audioCtx.createMediaElementSource(video);
    source.connect(firstFilter);

    audioReady = true;
    cancelAnimationFrame(animFrame);
    drawEQ();
  } else {
    // Trak nouvo — jis rezume kontèks la si li suspann
    if (audioCtx.state === 'suspended') audioCtx.resume();
    gainNode.gain.value = video.volume;
  }
}

function applyBandGain(i, db) { if (filters[i]) filters[i].gain.value = db; }
function resetBands() {
  filters.forEach(f => { if(f) f.gain.value = 0; });
  document.querySelectorAll('.band-slider').forEach(s => s.value = 0);
  toast('Bann remèt nòmal ✓');
}

// ── PLAYBACK ──
function togglePlay() {
  if (!video.src) { toast('Chwazi yon fichye an premye'); return; }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (video.paused) { video.play(); document.getElementById('play-btn').textContent = '⏸'; }
  else { video.pause(); document.getElementById('play-btn').textContent = '▶'; }
}
function skip(s) { if (video.src) video.currentTime = Math.max(0, video.currentTime + s); }
function toggleLoop() {
  looping = !looping; video.loop = looping;
  document.getElementById('loop-btn').classList.toggle('active', looping);
  toast(looping ? 'Repete: AKTIF' : 'Repete: DEZAKTIVE');
}
function setVolume(v) {
  // v = 0..1 depi slider a
  // video.volume rete a 1 toutan — se gainNode ki kontwole vrè volim nan
  // 0..0.5 → gain 0..1 (nòmal), 0.5..1 → gain 1..3 (amplifye)
  const gain = +v <= 0.5 ? +v * 2 : 1 + (+v - 0.5) * 4;
  if (gainNode) gainNode.gain.value = gain;
  video.volume = Math.min(1, +v * 2); // pou navigatè ki pa sipòte Web Audio
  document.getElementById('vol-val').textContent = Math.round(v * 100) + '%';
  document.getElementById('vol-slider').style.setProperty('--vol-pct', (+v * 100) + '%');
  const icon = document.getElementById('vol-icon');
  icon.textContent = +v === 0 ? '🔇' : +v < 0.3 ? '🔈' : +v < 0.6 ? '🔉' : '🔊';
  muted = (+v === 0);
}
function toggleMute() {
  if (muted) {
    document.getElementById('vol-slider').value = prevVol;
    setVolume(prevVol);
  } else {
    prevVol = +document.getElementById('vol-slider').value;
    document.getElementById('vol-slider').value = 0;
    setVolume(0);
  }
  muted = !muted;
}
function setSpeed(v) { video.playbackRate = +v; document.getElementById('speed-val').textContent = (+v).toFixed(2)+'×'; }
function setPitch(v) { document.getElementById('pitch-val').textContent = (v>=0?'+':'')+v+'st'; }
function seekTo(pct) { if (video.duration) video.currentTime = (pct/100)*video.duration; }

video.addEventListener('timeupdate', () => {
  if (!video.duration) return;
  const pct = (video.currentTime/video.duration)*100;
  const prog = document.getElementById('progress');
  prog.value = pct; prog.style.setProperty('--prog-pct', pct+'%');
  document.getElementById('time-cur').textContent = fmt(video.currentTime);
  document.getElementById('time-dur').textContent = fmt(video.duration);
});

function fmt(s) { const m=Math.floor(s/60),ss=Math.floor(s%60); return `${m}:${ss.toString().padStart(2,'0')}`; }

// ── FULLSCREEN ──
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.getElementById('app').requestFullscreen?.();
    document.getElementById('fs-btn').textContent = '⊠';
    document.getElementById('fs-btn').title = 'Redwi ekran';
  } else {
    document.exitFullscreen?.();
    document.getElementById('fs-btn').textContent = '⛶';
    document.getElementById('fs-btn').title = 'Agrandi ekran';
  }
}
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fs-btn');
  btn.textContent = document.fullscreenElement ? '⊠' : '⛶';
  btn.title = document.fullscreenElement ? 'Redwi ekran' : 'Agrandi ekran';
});

// ── AMBIENT ──
function updateAmbient(name) {
  const colors = ['#FFD166','#06D6A0','#FF6B6B','#9B59B6','#3498DB'];
  const c = colors[name.length % colors.length];
  const blur = document.getElementById('ambient-blur');
  blur.style.background = `radial-gradient(ellipse at 50% 50%, ${c}33 0%, transparent 70%)`;
  blur.style.opacity = '1';
}

// ═══════════════════════════════════════════════
//  EQUALIZER VISUALIZER
// ═══════════════════════════════════════════════

function setEqMode(mode, btn) {
  eqMode = mode;
  document.querySelectorAll('.eq-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Small EQ (popup)
function drawEQ() {
  animFrame = requestAnimationFrame(drawEQ);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const data = getData();
  if (eqMode==='ring') drawRing(ctx,data,W,H);
  else if (eqMode==='bars') drawBars(ctx,data,W,H);
  else if (eqMode==='wave') drawWave(ctx,data,W,H);
  else drawOrb(ctx,data,W,H);
}

// Full EQ for audio mode
function startFullEQ() {
  cancelAnimationFrame(animFrameFull);
  function loop() {
    animFrameFull = requestAnimationFrame(loop);
    const W = canvasFull.width, H = canvasFull.height;
    ctxFull.clearRect(0,0,W,H);
    const data = getData();
    drawRing(ctxFull, data, W, H, true);
  }
  loop();
}

function getData() {
  if (!analyser) {
    const d = new Uint8Array(64);
    const t = Date.now();
    for(let i=0;i<64;i++) d[i] = 80 + 50*Math.sin(t/900+i*0.6)*Math.abs(Math.sin(t/400+i*0.3));
    return d;
  }
  const d = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  return d;
}

function avg8(data) { return data.slice(0,8).reduce((a,b)=>a+b,0)/8; }

function drawRing(c, data, W, H, large=false) {
  const cx=W/2, cy=H/2, bars=large?96:72;
  const r0=large?90:50, rMax=large?150:85;
  const t=Date.now(), avg=avg8(data);

  // Base ring
  c.beginPath(); c.arc(cx,cy,r0+avg*0.07,0,Math.PI*2);
  c.strokeStyle=`rgba(255,209,102,${0.18+avg*0.002})`; c.lineWidth=1.5+avg*0.03; c.stroke();

  // Inner glow
  const pulse=r0*0.5+avg*0.1;
  const grd=c.createRadialGradient(cx,cy,0,cx,cy,pulse);
  grd.addColorStop(0,`rgba(255,209,102,${0.1+avg*0.002})`);
  grd.addColorStop(1,'transparent');
  c.beginPath(); c.arc(cx,cy,pulse,0,Math.PI*2); c.fillStyle=grd; c.fill();

  // Bars
  for(let i=0;i<bars;i++) {
    const angle=(i/bars)*Math.PI*2-Math.PI/2+Date.now()*0.0003;
    const idx=Math.floor((i/bars)*(data.length*0.65));
    const val=data[idx]/255;
    const len=val*(rMax-r0)+2;
    const x1=cx+Math.cos(angle)*r0, y1=cy+Math.sin(angle)*r0;
    const x2=cx+Math.cos(angle)*(r0+len), y2=cy+Math.sin(angle)*(r0+len);
    const hue=35+(i/bars)*160;
    c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2);
    c.strokeStyle=`hsla(${hue},80%,65%,${0.5+val*0.5})`;
    c.lineWidth=large?3:2.5; c.lineCap='round'; c.stroke();
  }

  // Center dot
  const cd=c.createRadialGradient(cx,cy,0,cx,cy,large?14:9);
  cd.addColorStop(0,'rgba(232,201,122,0.95)'); cd.addColorStop(1,'rgba(201,168,76,0)');
  c.beginPath(); c.arc(cx,cy,large?10+avg*0.05:7+avg*0.04,0,Math.PI*2); c.fillStyle=cd; c.fill();
}

function drawBars(c, data, W, H) {
  const bars=48, bw=W/bars;
  for(let i=0;i<bars;i++) {
    const idx=Math.floor((i/bars)*(data.length*0.7));
    const val=data[idx]/255, bh=val*H*0.85, x=i*bw, y=H-bh;
    const hue=30+val*160;
    const grd=c.createLinearGradient(x,y,x,H);
    grd.addColorStop(0,`hsla(${hue},80%,65%,0.9)`);
    grd.addColorStop(1,`hsla(${hue},80%,40%,0.3)`);
    c.fillStyle=grd; c.fillRect(x+1,y,bw-2,bh);
  }
}

function drawWave(c, data, W, H) {
  const wd=new Uint8Array(analyser?analyser.fftSize:128);
  if(analyser) analyser.getByteTimeDomainData(wd); else wd.fill(128);
  const sl=W/wd.length;
  c.beginPath(); c.strokeStyle='rgba(255,209,102,0.85)'; c.lineWidth=2;
  for(let i=0;i<wd.length;i++) { const x=i*sl,y=((wd[i]/128)-1)*H*0.4+H/2; i===0?c.moveTo(x,y):c.lineTo(x,y); }
  c.stroke();
  c.beginPath(); c.strokeStyle='rgba(6,214,160,0.4)'; c.lineWidth=1.5;
  for(let i=0;i<wd.length;i++) { const x=i*sl,y=((wd[i]/128)-1)*H*0.25+H*0.35; i===0?c.moveTo(x,y):c.lineTo(x,y); }
  c.stroke();
}

function drawOrb(c, data, W, H) {
  const cx=W/2,cy=H/2,t=Date.now()*0.001,avg=avg8(data),r=45+avg*0.25,pts=48;
  c.beginPath();
  for(let i=0;i<=pts;i++) {
    const a=(i/pts)*Math.PI*2;
    const idx=Math.floor((i/pts)*(data.length*0.5));
    const noise=(data[idx]/255)*22;
    const rr=r+noise+8*Math.sin(a*4+t);
    i===0?c.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):c.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);
  }
  c.closePath();
  const grd=c.createRadialGradient(cx,cy,0,cx,cy,r+30);
  grd.addColorStop(0,`rgba(255,209,102,${0.3+avg*0.002})`);
  grd.addColorStop(0.5,`rgba(6,214,160,${0.15+avg*0.001})`);
  grd.addColorStop(1,'rgba(255,107,107,0)');
  c.fillStyle=grd; c.fill();
  c.strokeStyle='rgba(232,201,122,0.5)'; c.lineWidth=1.5; c.stroke();
}

// Start idle animation
drawEQ();

function copyLink() {
  if (navigator.share) { navigator.share({title:'PRISM Player',url:window.location.href}).then(()=>toast('Pataje reyisi! ✓')).catch(()=>{}); }
  else { navigator.clipboard.writeText(window.location.href).then(()=>toast('Lyen kopye! ✓')).catch(()=>toast('Pa kapab kopye')); }
}

// ── TOAST ──
function toast(msg, dur=2200) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowLeft') skip(-5);
  if(e.code==='ArrowRight') skip(5);
  if(e.code==='ArrowUp'){playPrev();}
  if(e.code==='ArrowDown'){playNext();}
  if(e.code==='KeyM') toggleMute();
  if(e.code==='KeyF') toggleFullscreen();
  if(e.code==='KeyL') toggleLoop();
});
